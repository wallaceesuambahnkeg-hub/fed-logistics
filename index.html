<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Fed Logistics — Fast UK Shipping & Global Courier Services</title>
    <meta name="description" content="Fed Logistics offers fast, reliable shipping and courier services from London, UK to worldwide destinations. Get instant quotes, real-time package tracking, same-day and express delivery." />
    <meta name="keywords" content="shipping UK, courier London, package tracking, express delivery, international shipping, logistics company UK, send parcel UK, same day delivery London, freight services, Fed Logistics" />
    <meta name="author" content="Fed Logistics Ltd" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://fed-logistics.onrender.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Fed Logistics" />
    <meta property="og:title" content="Fed Logistics — Fast UK Shipping & Global Courier Services" />
    <meta property="og:description" content="Ship anywhere in the world from London. Get instant quotes, real tracking numbers and same-day delivery. Trusted by thousands of customers." />
    <meta property="og:url" content="https://fed-logistics.onrender.com/" />
    <meta property="og:image" content="https://bidmoncorp.com/images/about-hero.jpg" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fed Logistics — Fast UK Shipping & Global Courier Services" />
    <meta name="twitter:description" content="Ship anywhere in the world from London. Get instant quotes, real tracking numbers and same-day delivery." />
    <meta name="twitter:image" content="https://bidmoncorp.com/images/about-hero.jpg" />

    <!-- Local SEO -->
    <meta name="geo.region" content="GB-ENG" />
    <meta name="geo.placename" content="London" />
    <meta name="geo.position" content="51.504441;-0.021769" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MovingCompany",
      "name": "Fed Logistics",
      "description": "Fast, reliable shipping and courier services from London UK to worldwide destinations.",
      "url": "https://fed-logistics.onrender.com",
      "telephone": "+44-7735-380906",
      "email": "support@fedlogistics.com",
      "image": "https://bidmoncorp.com/images/about-hero.jpg",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "1 Canada Square",
        "addressLocality": "London",
        "addressRegion": "England",
        "postalCode": "E14 5AB",
        "addressCountry": "GB"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 51.504441,
        "longitude": -0.021769
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
          "opens": "08:00",
          "closes": "20:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": "Saturday",
          "opens": "09:00",
          "closes": "17:00"
        }
      ],
      "areaServed": { "@type": "Place", "name": "Worldwide" },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Shipping Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Ground Delivery", "description": "1-5 business days shipping" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Express Shipping", "description": "Next business day delivery" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Same Day Delivery", "description": "Delivered the same day in London" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "International Shipping", "description": "Worldwide shipping to 200+ countries" } }
        ]
      }
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
